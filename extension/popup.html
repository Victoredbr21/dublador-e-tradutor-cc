<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fernando CC Reader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-label="Fernando CC Reader">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8"  y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <span class="app-title">Fernando CC Reader</span>

      <!-- POP-3: Master Switch — verde = lendo, vermelho = parado -->
      <button id="btn-toggle" class="master-switch off" aria-label="Ativar narrador" title="Ligar / Desligar leitura">
        <span class="switch-icon" id="switch-icon">&#9654;</span>
      </button>
    </div>

    <!-- Status bar -->
    <div id="status-bar" class="status-bar idle">
      <span id="status-dot" class="status-dot"></span>
      <span id="status-text">Desativado</span>
    </div>

    <!-- Display da legenda atual -->
    <div class="cc-display">
      <div class="cc-label">Legenda detectada</div>
      <div id="cc-original" class="cc-text original" title="Texto original">&mdash;</div>
      <div class="cc-label" id="label-translated" style="display:none">Tradu&ccedil;&atilde;o PT-BR</div>
      <div id="cc-translated" class="cc-text translated" style="display:none">&mdash;</div>
    </div>

    <!-- Config: Voz -->
    <div class="section">
      <label class="section-label" for="select-voice">&#128266; Voz do narrador</label>
      <select id="select-voice">
        <optgroup label="PT-BR &mdash; Portugu&ecirc;s Brasil">
          <option value="pt-BR-AntonioNeural">Antonio (masculino)</option>
          <option value="pt-BR-FranciscaNeural" selected>Francisca (feminino)</option>
          <option value="pt-BR-ThalitaNeural">Thalita (feminino)</option>
          <option value="pt-BR-DonatoNeural">Donato (masculino)</option>
          <option value="pt-BR-FabioNeural">Fabio (masculino)</option>
          <option value="pt-BR-GiovannaNeural">Giovanna (feminino)</option>
          <option value="pt-BR-HumbertoNeural">Humberto (masculino)</option>
          <option value="pt-BR-JulioNeural">Julio (masculino)</option>
          <option value="pt-BR-NicolauNeural">Nicolau (masculino)</option>
          <option value="pt-BR-ValerioNeural">Valerio (masculino)</option>
          <option value="pt-BR-YaraNeural">Yara (feminino)</option>
        </optgroup>
        <optgroup label="PT-PT &mdash; Portugu&ecirc;s Portugal">
          <option value="pt-PT-DuarteNeural">Duarte (masculino)</option>
          <option value="pt-PT-FernandaNeural">Fernanda (feminino)</option>
        </optgroup>
      </select>
    </div>

    <!-- Config: Idioma fonte (para traducao) -->
    <div class="section">
      <label class="section-label" for="select-lang">&#127760; Idioma da legenda</label>
      <select id="select-lang">
        <option value="auto" selected>Detectar automaticamente</option>
        <option value="en">Ingl&ecirc;s (en)</option>
        <option value="es">Espanhol (es)</option>
        <option value="fr">Franc&ecirc;s (fr)</option>
        <option value="de">Alem&atilde;o (de)</option>
        <option value="it">Italiano (it)</option>
        <option value="ja">Japon&ecirc;s (ja)</option>
        <option value="zh">Chin&ecirc;s (zh)</option>
        <option value="ko">Coreano (ko)</option>
        <option value="pt">Portugu&ecirc;s (sem traduzir)</option>
      </select>
    </div>

    <!-- Config: Velocidade -->
    <div class="section">
      <label class="section-label" for="slider-rate">&#9193; Velocidade</label>
      <div class="slider-wrap">
        <input type="range" id="slider-rate" min="0.5" max="2.0" value="1.1" step="0.05">
        <span id="label-rate" class="slider-val">1.10&times;</span>
      </div>
    </div>

    <!-- Config: Volume -->
    <div class="section">
      <label class="section-label" for="slider-volume">&#128265; Volume do narrador</label>
      <div class="slider-wrap">
        <input type="range" id="slider-volume" min="0" max="1" value="1.0" step="0.05">
        <span id="label-volume" class="slider-val">100%</span>
      </div>
    </div>

    <div class="footer">v1.1.0 &middot; Oracle MyLearn</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
