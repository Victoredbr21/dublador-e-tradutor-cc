<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fernando CC Reader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-label="Fernando CC Reader">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8"  y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <span class="app-title">Fernando CC Reader</span>
      <button id="btn-toggle" class="toggle-btn off" aria-label="Ativar narrador" title="Ativar / Desativar">
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
      </button>
    </div>

    <!-- Status bar -->
    <div id="status-bar" class="status-bar idle">
      <span id="status-dot" class="status-dot"></span>
      <span id="status-text">Desativado</span>
    </div>

    <!-- Legenda atual sendo narrada -->
    <div class="cc-display">
      <div class="cc-label">Legenda detectada</div>
      <div id="cc-original" class="cc-text original" title="Texto original">—</div>
      <div class="cc-label" id="label-translated" style="display:none">Tradução PT-BR</div>
      <div id="cc-translated" class="cc-text translated" style="display:none">—</div>
    </div>

    <!-- Config: Voz -->
    <div class="section">
      <label class="section-label" for="select-voice">🔊 Voz</label>
      <select id="select-voice">
        <optgroup label="PT-BR — Português Brasil">
          <option value="pt-BR-AntonioNeural">Antonio (masculino)</option>
          <option value="pt-BR-FranciscaNeural">Francisca (feminino)</option>
          <option value="pt-BR-ThalitaNeural">Thalita (feminino)</option>
          <option value="pt-BR-DonatoNeural">Donato (masculino)</option>
          <option value="pt-BR-FabioNeural">Fabio (masculino)</option>
          <option value="pt-BR-GiovannaNeural">Giovanna (feminino)</option>
          <option value="pt-BR-HumbertoNeural">Humberto (masculino)</option>
          <option value="pt-BR-JulioNeural">Julio (masculino)</option>
          <option value="pt-BR-NicolauNeural">Nicolau (masculino)</option>
          <option value="pt-BR-ValerioNeural">Valerio (masculino)</option>
          <option value="pt-BR-YaraNeural">Yara (feminino)</option>
        </optgroup>
        <optgroup label="PT-PT — Português Portugal">
          <option value="pt-PT-DuarteNeural">Duarte (masculino)</option>
          <option value="pt-PT-FernandaNeural">Fernanda (feminino)</option>
        </optgroup>
      </select>
    </div>

    <!-- Config: Velocidade -->
    <div class="section">
      <label class="section-label" for="slider-rate">⏩ Velocidade</label>
      <div class="slider-wrap">
        <input type="range" id="slider-rate" min="0.5" max="2.0" value="1.1" step="0.05">
        <span id="label-rate" class="slider-val">1.1×</span>
      </div>
    </div>

    <!-- Config: Volume -->
    <div class="section">
      <label class="section-label" for="slider-volume">🔉 Volume do narrador</label>
      <div class="slider-wrap">
        <input type="range" id="slider-volume" min="0" max="1" value="1.0" step="0.05">
        <span id="label-volume" class="slider-val">100%</span>
      </div>
    </div>

    <!-- Config: Traduzir EN -->
    <div class="section row">
      <span class="section-label">🌐 Traduzir legendas em inglês</span>
      <label class="mini-toggle" for="chk-translate" aria-label="Traduzir inglês para PT-BR">
        <input type="checkbox" id="chk-translate" checked>
        <span class="mini-track"><span class="mini-thumb"></span></span>
      </label>
    </div>

    <div class="footer">v1.0.0 · Oracle MyLearn</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
